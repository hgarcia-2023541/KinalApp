<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard · KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-nature">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-leaf"></i> KinalApp
        </a>
        <div class="d-flex gap-3 align-items-center">
            <span class="text-white">
                <i class="fas fa-user"></i> <span th:text="${session.usuario != null ? session.usuario.username : 'Invitado'}"></span>
            </span>
            <a th:href="@{/logout}" class="btn-nature-outline">
                <i class="fas fa-sign-out-alt"></i> Salir
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="welcome-card">
                <h1>Bienvenido, <span th:text="${session.usuario != null ? session.usuario.username : ''}"></span></h1>
                <p>Gestiona tus clientes, productos, ventas y más desde este panel.</p>
            </div>
        </div>
    </div>

    <div class="row mt-4 g-4">
        <div class="col-md-4">
            <div class="menu-card" onclick="location.href='/clientes'">
                <i class="fas fa-users fa-3x"></i>
                <h4>Clientes</h4>
                <p>Gestionar clientes</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="menu-card" onclick="location.href='/productos'">
                <i class="fas fa-box fa-3x"></i>
                <h4>Productos</h4>
                <p>Gestionar productos</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="menu-card" onclick="location.href='/usuarios'">
                <i class="fas fa-user-cog fa-3x"></i>
                <h4>Usuarios</h4>
                <p>Gestionar usuarios</p>
            </div>
        </div>
        <div class="col-md-6">
            <div class="menu-card" onclick="location.href='/ventas'">
                <i class="fas fa-shopping-cart fa-3x"></i>
                <h4>Ventas</h4>
                <p>Gestionar ventas</p>
            </div>
        </div>
        <div class="col-md-6">
            <div class="menu-card" onclick="location.href='/detalle-ventas'">
                <i class="fas fa-receipt fa-3x"></i>
                <h4>Detalle de Ventas</h4>
                <p>Gestionar detalles</p>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('.menu-card').forEach(card => {
        card.addEventListener('click', () => {
            const onclick = card.getAttribute('onclick');
            const url = onclick.match(/'(.*?)'/)[1];
            window.location.href = url;
        });
    });
</script>
</body>
</html>
