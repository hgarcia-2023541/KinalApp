<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Formulario Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-nature">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-leaf"></i> KinalApp</a>
        <div class="d-flex gap-3 align-items-center">
            <span class="text-white"><i class="fas fa-user"></i> <span th:text="${session.usuario != null ? session.usuario.username : 'Invitado'}"></span></span>
            <a th:href="@{/logout}" class="btn-nature-outline">Salir</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex gap-2 mb-4">
        <a href="/" class="btn btn-verde"><i class="fas fa-home"></i> Inicio</a>
        <a th:href="@{/productos}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Volver a lista</a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-nature">
                <h3 class="mb-4" th:text="${titulo}"></h3>
                <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                    <div class="mb-3"><label class="form-label">Nombre</label><input type="text" th:field="*{nombreProducto}" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Precio</label><input type="number" step="0.01" th:field="*{precio}" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Stock</label><input type="number" th:field="*{stock}" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Estado</label>
                        <select th:field="*{estado}" class="form-select"><option th:value="1">Activo</option><option th:value="0">Inactivo</option></select>
                    </div>
                    <div class="d-flex gap-3"><a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a><button type="submit" class="btn-nature">Guardar</button></div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
