<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos · KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-nature">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-leaf"></i> KinalApp
        </a>
        <div class="d-flex gap-3 align-items-center">
            <span class="text-white">
                <i class="fas fa-user"></i> <span th:text="${session.usuario != null ? session.usuario.username : 'Invitado'}"></span>
            </span>
            <a th:href="@{/logout}" class="btn-nature-outline">Salir</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex gap-2 mb-4">
        <a href="/" class="btn btn-verde"><i class="fas fa-home"></i> Inicio</a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Volver</a>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-box"></i> <span th:text="${titulo}"></span></h2>
        <a th:href="@{/productos/nuevo}" class="btn-verde"><i class="fas fa-plus"></i> Nuevo Producto</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-nature">
            <tr><th>Código</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Estado</th><th>Acciones</th></tr>
            </thead>
            <tbody>
            <tr th:each="producto : ${productos}">
                <td th:text="${producto.codigoProducto}"></td>
                <td th:text="${producto.nombreProducto}"></td>
                <td th:text="'Q' + ${producto.precio}"></td>
                <td th:text="${producto.stock}"></td>
                <td><span th:if="${producto.estado == 1}" class="badge bg-success">Activo</span><span th:if="${producto.estado == 0}" class="badge bg-danger">Inactivo</span></td>
                <td><a th:href="@{/productos/editar/{id}(id=${producto.codigoProducto})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                    <a th:href="@{/productos/eliminar/{id}(id=${producto.codigoProducto})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')"><i class="fas fa-trash"></i></a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(productos)}"><td colspan="6" class="text-center">No hay productos</td></tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
