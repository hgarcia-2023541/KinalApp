<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">

<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-4">
            <div class="card-nature text-center">

                <div class="mb-4">
                    <i class="fas fa-leaf fa-3x" style="color: var(--verde-primary)"></i>
                    <h2 class="mt-2">KinalApp</h2>
                    <p class="text-muted">Gestión de Clientes</p>
                </div>

                <!-- Mensaje de error del controller -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3 text-start">
                        <label class="form-label">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" name="username"
                                   class="form-control" placeholder="Tu usuario" required>
                        </div>
                    </div>

                    <div class="mb-4 text-start">
                        <label class="form-label">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" name="password"
                                   class="form-control" placeholder="Tu contraseña" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-verde w-100">
                        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                    </button>
                </form>

                <hr>
                <p class="text-muted">¿No tienes cuenta?
                    <a th:href="@{/registro}">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
