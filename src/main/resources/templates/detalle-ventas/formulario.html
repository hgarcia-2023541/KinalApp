<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Formulario Detalle Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-nature">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">
            <i class="fas fa-leaf"></i> KinalApp
        </a>
        <div class="d-flex gap-3 align-items-center">
            <span class="text-white">
                <i class="fas fa-user"></i>
                <span th:text="${session.usuario != null ? session.usuario.username : 'Invitado'}"></span>
            </span>
            <a th:href="@{/logout}" class="btn-nature-outline">Salir</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex gap-2 mb-4">
        <a href="/dashboard" class="btn-verde">
            <i class="fas fa-home"></i> Inicio
        </a>
        <a th:href="@{/detalle-ventas}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Volver a lista
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-nature">
                <h3 class="mb-4" th:text="${titulo}"></h3>

                <!-- SIN th:object, campos con name simples -->
                <form th:action="@{/detalle-ventas/guardar}" method="post">

                    <!-- ID oculto para edición -->
                    <input type="hidden" name="codigoDetalleVenta"
                           th:value="${detalle.codigoDetalleVenta}">

                    <div class="mb-3">
                        <label class="form-label">Cantidad *</label>
                        <input type="number" name="cantidad"
                               th:value="${detalle.cantidad}"
                               class="form-control" required min="1">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio Unitario *</label>
                        <input type="number" step="0.01" name="precioUnitario"
                               th:value="${detalle.precioUnitario}"
                               class="form-control" required min="0">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Producto *</label>
                        <select name="codigoProducto" class="form-select" required>
                            <option value="">Seleccionar producto...</option>
                            <option th:each="p : ${productos}"
                                    th:value="${p.codigoProducto}"
                                    th:text="${p.nombreProducto + ' - Q' + p.precio}"
                                    th:selected="${detalle.producto != null and detalle.producto.codigoProducto == p.codigoProducto}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Venta *</label>
                        <select name="codigoVenta" class="form-select" required>
                            <option value="">Seleccionar venta...</option>
                            <option th:each="v : ${ventas}"
                                    th:value="${v.codigoVenta}"
                                    th:text="'Venta #' + ${v.codigoVenta} + ' - ' + ${v.fechaVenta}"
                                    th:selected="${detalle.venta != null and detalle.venta.codigoVenta == v.codigoVenta}">
                            </option>
                        </select>
                    </div>

                    <div class="d-flex gap-3 mt-3 justify-content-end">
                        <a th:href="@{/detalle-ventas}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn-verde">
                            <i class="fas fa-save"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
