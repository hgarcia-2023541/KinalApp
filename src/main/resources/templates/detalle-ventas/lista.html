<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Ventas · KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-nature">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-leaf"></i> KinalApp
        </a>
        <div class="d-flex gap-3 align-items-center">
            <span class="text-white">
                <i class="fas fa-user"></i> <span th:text="${session.usuario != null ? session.usuario.username : 'Invitado'}"></span>
            </span>
            <a th:href="@{/logout}" class="btn-nature-outline">Salir</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Botones de navegación -->
    <div class="d-flex gap-2 mb-4">
        <a href="/" class="btn-verde">
            <i class="fas fa-home"></i> Inicio
        </a>
        <a href="/dashboard" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-receipt"></i> <span th:text="${titulo}"></span></h2>
        <a th:href="@{/detalle-ventas/nuevo}" class="btn-verde">
            <i class="fas fa-plus"></i> Nuevo Detalle
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-nature">
            <tr>
                <th>Código</th>
                <th>Cantidad</th>
                <th>Precio Unitario</th>
                <th>Subtotal</th>
                <th>Producto</th>
                <th>Venta</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="detalle : ${detalles}">
                <td th:text="${detalle.codigoDetalleVenta}"></td>
                <td th:text="${detalle.cantidad}"></td>
                <td th:text="'Q' + ${detalle.precioUnitario}"></td>
                <td th:text="'Q' + ${detalle.subtotal}"></td>
                <td th:text="${detalle.producto != null ? detalle.producto.nombreProducto : 'N/A'}"></td>
                <td th:text="${detalle.venta != null ? detalle.venta.codigoVenta : 'N/A'}"></td>
                <td>
                    <a th:href="@{/detalle-ventas/editar/{id}(id=${detalle.codigoDetalleVenta})}" class="btn btn-sm btn-warning">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{/detalle-ventas/eliminar/{id}(id=${detalle.codigoDetalleVenta})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Eliminar este detalle?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(detalles)}">
                <td colspan="7" class="text-center">No hay detalles de venta registrados</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
