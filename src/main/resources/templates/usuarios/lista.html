<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios · KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-nature">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-leaf"></i> KinalApp
        </a>
        <div class="d-flex gap-3 align-items-center">
            <span class="text-white">
                <i class="fas fa-user"></i> <span th:text="${session.usuario != null ? session.usuario.username : 'Invitado'}"></span>
            </span>
            <a th:href="@{/logout}" class="btn-nature-outline">Salir</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-user-cog"></i> <span th:text="${titulo}"></span></h2>
        <a th:href="@{/usuarios/nuevo}" class="btn-nature">
            <i class="fas fa-plus"></i> Nuevo Usuario
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-nature">
            <tr>
                <th>Código</th>
                <th>Usuario</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.codigoUsuario}"></td>
                <td th:text="${usuario.username}"></td>
                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.rol}"></td>
                <td>
                    <span th:if="${usuario.estado == 1}" class="badge bg-success">Activo</span>
                    <span th:if="${usuario.estado == 0}" class="badge bg-danger">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/usuarios/editar/{id}(id=${usuario.codigoUsuario})}" class="btn btn-sm btn-warning">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.codigoUsuario})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Eliminar este usuario?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(usuarios)}">
                <td colspan="6" class="text-center">No hay usuarios registrados</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
